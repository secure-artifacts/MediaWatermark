name: Build and Release (TPSCSM L2)

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Compile updater.cpp
        run: |
          cl.exe /EHsc /O2 updater.cpp /Fe:update.exe user32.lib shell32.lib advapi32.lib
        shell: cmd

      - name: Build Main App with Nuitka
        run: |
          python -m nuitka --assume-yes-for-downloads --standalone --windows-console-mode=disable --windows-icon-from-ico=app_icon.ico --enable-plugin=pyside6 --output-filename=MediaWatermark.exe --output-dir=dist main.py

      - name: Prepare Inno Setup Directory
        run: |
          Rename-Item -Path dist\main.dist -NewName MediaWatermark
          Copy-Item update.exe -Destination dist\MediaWatermark\
          Copy-Item app_icon.ico -Destination dist\MediaWatermark\

      - name: Compile Inno Setup Installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows_setup.iss

      - name: Attest Windows Installer
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/MediaWatermark-Windows-Setup.exe'

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaWatermark-Windows
          path: dist/MediaWatermark-Windows-Setup.exe

  build-macos:
    runs-on: macos-latest
    permissions:
      id-token: write
      contents: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller Pillow

      - name: Convert PNG to ICNS
        run: |
          python tools/png2icns.py app_icon.png app_icon.icns

      - name: Build Main App with PyInstaller
        run: |
          pyinstaller --windowed --icon=app_icon.icns --name=MediaWatermark main.py

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "MediaWatermark" \
            --volicon "app_icon.icns" \
            --window-pos 200 120 \
            --window-size 800 400 \
            --icon-size 100 \
            --icon "MediaWatermark.app" 200 190 \
            --hide-extension "MediaWatermark.app" \
            --app-drop-link 600 185 \
            "MediaWatermark-macOS-arm64.dmg" \
            "dist/MediaWatermark.app" || true
          
          if [ ! -f "MediaWatermark-macOS-arm64.dmg" ]; then
            echo "DMG creation failed!"
            exit 1
          fi

      - name: Attest macOS DMG
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: "MediaWatermark-macOS-arm64.dmg"

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MediaWatermark-macOS-arm64
          path: "MediaWatermark-macOS-arm64.dmg"

  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
